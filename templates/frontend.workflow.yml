workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^feature.*/'
      variables:
        PIPELINE_MODE: 'frontend'
        image_env: 'dev'
        build_env: 'dev'
        deploy_targets: 'dev'
        RUNNER_TAG: 'generic-runner-k8s'

    - if: '$CI_COMMIT_BRANCH =~ /^develop.*/'
      variables:
        PIPELINE_MODE: 'frontend'
        image_env: 'fat'
        build_env: 'stage'
        deploy_targets: 'fat'
        RUNNER_TAG: 'generic-runner-k8s'

    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        PIPELINE_MODE: 'frontend'
        image_env: 'fat'
        build_env: 'stage'
        deploy_targets: 'fat'
        RUNNER_TAG: 'generic-runner-k8s'

    - if: '$CI_COMMIT_BRANCH == "release"'
      variables:
        PIPELINE_MODE: 'frontend'
        image_env: 'uat'
        image_source_env: 'uat'
        build_env: 'uat'
        deploy_targets: 'uat pro'
        RUNNER_TAG: 'generic-runner-k8s'

    - if: '$CI_COMMIT_BRANCH =~ /^platform.*/'
      variables:
        PIPELINE_MODE: 'frontend'
        image_env: 'platform'
        build_env: 'platform'
        deploy_targets: 'platform'
        RUNNER_TAG: 'generic-runner-k8s'
